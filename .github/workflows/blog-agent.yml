name: Blog Agent — Daily Post at 9AM Dubai

on:
  # 9:00 AM Dubai time = 5:00 AM UTC (Dubai is UTC+4)
  schedule:
    - cron: "0 5 * * *"

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      topic:
        description: "Override topic (leave empty for auto-selection)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  blog-agent:
    name: Generate & Publish Daily Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: seo-agent/package.json

      - name: Install SEO Agent dependencies
        working-directory: seo-agent
        run: npm install

      - name: Install project dependencies (for TypeScript check)
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "Blog Agent Bot"
          git config user.email "blog-agent@osama-me.digital"

      - name: Check API key is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ERROR: ANTHROPIC_API_KEY secret is not set!"
            echo "Go to: Settings → Secrets → Actions → New secret"
            echo "Name: ANTHROPIC_API_KEY"
            exit 1
          fi
          echo "✅ ANTHROPIC_API_KEY is configured"

      - name: Generate today's blog post
        working-directory: seo-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          BLOG_TOPIC_OVERRIDE: ${{ github.event.inputs.topic }}
        run: |
          echo "📝 Blog Agent starting..."
          echo "📁 Working dir: $(pwd)"
          echo "📁 Project root: $GITHUB_WORKSPACE"
          echo "📁 Blog file: $GITHUB_WORKSPACE/src/data/blog.ts"
          node --version
          npx tsx blog-agent.ts 2>&1 | tee ../blog-agent-run.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "--- FULL LOG ---"
          cat ../blog-agent-run.log
          echo "--- END LOG ---"
          exit $EXIT_CODE

      - name: Show blog.ts diff
        if: always()
        run: |
          echo "--- git diff src/data/blog.ts ---"
          git diff src/data/blog.ts | head -80 || echo "(no diff)"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/blog.ts && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Extract post title from log
        id: post_info
        if: steps.changes.outputs.changed == 'true'
        run: |
          TITLE=$(grep "Generated:" blog-agent-run.log | sed 's/.*Generated: "//' | sed 's/"//' | head -1)
          SLUG=$(grep "Slug:" blog-agent-run.log | sed 's/.*Slug: //' | head -1)
          echo "title=${TITLE}" >> $GITHUB_OUTPUT
          echo "slug=${SLUG}" >> $GITHUB_OUTPUT

      - name: Commit and push new blog post
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add src/data/blog.ts
          git commit -m "📝 New blog post: ${{ steps.post_info.outputs.title }}

          Slug: /blog/${{ steps.post_info.outputs.slug }}
          Published: $(date +'%Y-%m-%d')
          Generated by Blog Agent at 9AM Dubai time."
          git push origin main

      - name: No post generated
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "⚠️ No changes detected — blog.ts was not modified"
          echo "--- Last 30 lines of log ---"
          tail -30 blog-agent-run.log || echo "(no log file)"
          exit 1

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-agent-log-${{ github.run_number }}
          path: blog-agent-run.log
          retention-days: 30

      - name: Post summary
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "## ✅ Blog Post Published" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** ${{ steps.post_info.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://osama-me.digital/blog/${{ steps.post_info.outputs.slug }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
